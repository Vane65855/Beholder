syntax = "proto3";

package beholder.local;

option csharp_namespace = "Beholder.Protocol.Local";

// Enum ordinals deliberately mirror the Beholder.Core C# enums one-for-one so
// that wire values can round-trip by cast in the Phase 4.2 converters. This
// means Direction/FirewallAction/RuleSource do not follow the proto3
// "*_UNSPECIFIED = 0" convention — their zero slot is a real value.

enum Direction {
  INBOUND = 0;
  OUTBOUND = 1;
}

enum FirewallAction {
  ALLOW = 0;
  BLOCK = 1;
}

enum RuleSource {
  MANUAL = 0;
  DEFAULT = 1;
  REMOTE = 2;
}

enum AlertKind {
  ALERT_KIND_UNKNOWN = 0;
  NEW_PROCESS = 1;
  HASH_CHANGED = 2;
  CHAIN_ERROR = 3;
}

// ---- Value messages ----

// Mirrors Beholder.Core.CounterSnapshot. Timestamps are Unix nanoseconds
// to avoid depending on google/protobuf/timestamp.proto. Country codes on
// the wire are the alpha-2 string (real codes), "??" (Unknown), or "--"
// (Local) — no dedicated message wrapper.
message CounterSnapshot {
  string process_name = 1;
  string process_path = 2;
  int64 total_bytes_in = 3;
  int64 total_bytes_out = 4;
  int64 delta_bytes_in = 5;
  int64 delta_bytes_out = 6;
  int32 active_connection_count = 7;
  map<string, int64> bytes_out_by_country = 8;
  int64 timestamp_unix_ns = 9;
}

// Mirrors Beholder.Core.FirewallRule.
message FirewallRule {
  int32 id = 1;
  string process_path = 2;
  Direction direction = 3;
  FirewallAction action = 4;
  RuleSource source = 5;
  int64 created_at_unix_ns = 6;
  int64 updated_at_unix_ns = 7;
}

// Mirrors Beholder.Core.Alert. first_viewed_at_unix_ns is 0 when the alert
// is still unread; a sentinel is used instead of a proto3 `optional` wrapper
// to keep the wire format flat. The Phase 4.2 converter maps 0 back to
// DateTimeOffset? null.
message Alert {
  int64 seq = 1;
  AlertKind kind = 2;
  string process_path = 3;
  string summary = 4;
  int64 timestamp_unix_ns = 5;
  int64 first_viewed_at_unix_ns = 6;
}

// ---- Streaming: Subscribe ----

message SubscribeRequest {}

// A single event pushed from the daemon to a subscribed UI client over the
// server-streaming Subscribe RPC. The oneof ensures the UI handles each
// variant explicitly and new variants are additive (Open/Closed).
message DaemonEvent {
  oneof payload {
    CounterBatch counter_batch = 1;
    FirewallRuleChange rule_change = 2;
    AlertEvent alert = 3;
    LanDeviceFirstSeenEvent lan_device_first_seen = 4;
    LanDeviceMacChangedEvent lan_device_mac_changed = 5;
    LanDeviceLabelChangedEvent lan_device_label_changed = 6;
  }
}

message CounterBatch {
  repeated CounterSnapshot snapshots = 1;
  int64 tick_timestamp_unix_ns = 2;
}

message FirewallRuleChange {
  enum ChangeKind {
    CREATED = 0;
    CHANGED = 1;
    REMOVED = 2;
  }
  ChangeKind change = 1;
  FirewallRule rule = 2;
}

message AlertEvent {
  Alert alert = 1;
}

// ---- Unary RPCs ----

message GetSnapshotRequest {}

message GetSnapshotResponse {
  repeated CounterSnapshot snapshots = 1;
  repeated FirewallRule firewall_rules = 2;
  repeated Alert recent_alerts = 3;
  // Reflects IFirewallEnforcementState.Enabled at snapshot time. The UI's
  // Firewall tab reads this on activation to render the master ON/OFF toggle
  // without a second round-trip; subsequent toggles are pushed via the
  // SetFirewallEnabled RPC's response and the FirewallRuleChange broadcast
  // stream.
  bool firewall_enforcement_enabled = 4;
}

message ApplyFirewallRuleRequest {
  string process_path = 1;
  Direction direction = 2;
  FirewallAction action = 3;
  RuleSource source = 4;
}

message ApplyFirewallRuleResponse {
  FirewallRule rule = 1;
}

message RemoveFirewallRuleRequest {
  string process_path = 1;
  Direction direction = 2;
}

// Idempotent: removing a non-existent rule succeeds with `removed = false`
// and an empty `rule`. Removing an existing rule returns `removed = true`
// with the rule that was deleted (useful for the UI to render an undo).
message RemoveFirewallRuleResponse {
  bool removed = 1;
  FirewallRule rule = 2;
}

message ListFirewallRulesRequest {}

message ListFirewallRulesResponse {
  repeated FirewallRule rules = 1;
}

message SetFirewallEnabledRequest {
  bool enabled = 1;
}

// `enabled` echoes the resulting state after the toggle (idempotent — re-
// setting the current value is a no-op and returns the same state without
// re-running the apply/remove enumeration).
message SetFirewallEnabledResponse {
  bool enabled = 1;
}

message MarkAlertReadRequest {
  int64 seq = 1;
}

message MarkAlertReadResponse {}

message VerifyChainRequest {}

message VerifyChainResponse {
  bool is_valid = 1;
  int64 rows_verified = 2;
  int64 failed_at_seq = 3;      // 0 when is_valid = true
  string error_message = 4;     // "" when is_valid = true
}

// ---- Historical traffic query messages ----

message TrafficTimePoint {
  int64 timestamp_unix_ns = 1;
  int64 bytes_in = 2;
  int64 bytes_out = 3;
}

message DestinationSummary {
  string remote_address = 1;
  string hostname = 2;         // empty string when unknown
  string country = 3;          // alpha-2, "??", or "--"
  int64 total_bytes_in = 4;
  int64 total_bytes_out = 5;
  int32 connection_count = 6;
}

message CountryTrafficSummary {
  string country = 1;          // alpha-2, "??", or "--"
  int64 total_bytes_in = 2;
  int64 total_bytes_out = 3;
}

message ProtocolBreakdownSummary {
  string protocol_name = 1;    // "HTTPS", "DNS", "Port 8080", etc.
  string transport = 2;        // "TCP" (UDP deferred)
  int64 total_bytes_in = 3;
  int64 total_bytes_out = 4;
}

message GetProcessTimelineRequest {
  string process_path = 1;
  int64 from_unix_ns = 2;
  int64 to_unix_ns = 3;
  int64 resolution_ms = 4;
}

message GetProcessTimelineResponse {
  repeated TrafficTimePoint points = 1;
}

message GetProcessDestinationsRequest {
  // Empty string = aggregate across all processes; non-empty = filter to
  // that single process. Phase 6.3 widened this RPC to support both modes
  // for the Traffic tab's COLS view; "Process" in the name is retained
  // for wire compatibility.
  string process_path = 1;
  int64 from_unix_ns = 2;
  int64 to_unix_ns = 3;
  // Phase 8 polish: optional alpha-2 country filter. Empty string = no
  // filter (preserves existing COLS behavior). Used by the map hover
  // tooltip to fetch top-N destinations within a single country.
  string country = 4;
  // Phase 8 polish: optional top-N cap. 0 or negative = unbounded
  // (preserves existing COLS behavior). Applied after ORDER BY total
  // bytes DESC, so non-zero limit returns the loudest N destinations.
  int32 limit = 5;
}

message GetProcessDestinationsResponse {
  repeated DestinationSummary destinations = 1;
}

message GetAggregateTimelineRequest {
  int64 from_unix_ns = 1;
  int64 to_unix_ns = 2;
  int64 resolution_ms = 3;
}

message GetAggregateTimelineResponse {
  repeated TrafficTimePoint points = 1;
}

message GetCountryBreakdownRequest {
  int64 from_unix_ns = 1;
  int64 to_unix_ns = 2;
  // Empty string = aggregate across all processes; non-empty = filter to
  // that single process. Added in Phase 6.3 for the Traffic tab's COLS view.
  string process_path = 3;
}

message GetCountryBreakdownResponse {
  repeated CountryTrafficSummary countries = 1;
}

message GetProtocolBreakdownRequest {
  int64 from_unix_ns = 1;
  int64 to_unix_ns = 2;
  // Empty string = aggregate across all processes; non-empty = filter to
  // that single process.
  string process_path = 3;
}

message GetProtocolBreakdownResponse {
  repeated ProtocolBreakdownSummary protocols = 1;
}

message GetProcessSummariesRequest {
  int64 from_unix_ns = 1;
  int64 to_unix_ns = 2;
  // Phase 9.6: optional remote-address filter. Empty string = no filter
  // (preserves existing aggregate-over-all-destinations behavior); non-empty
  // = restrict the per-process aggregation to traffic whose remote address
  // matches. Backs the Scanner-tab "VIEW IN TRAFFIC" cross-link — answers
  // "which processes on my box talked to this LAN device's IP?".
  string remote_address = 3;
}

message ProcessTrafficSummaryProto {
  string process_path = 1;
  string process_name = 2;
  int64 total_bytes_in = 3;
  int64 total_bytes_out = 4;
}

message GetProcessSummariesResponse {
  repeated ProcessTrafficSummaryProto summaries = 1;
}

// ---- Firewall activity (Phase 6.5) ----

enum FirewallActivityKind {
  FIREWALL_ACTIVITY_UNKNOWN = 0;
  RULE_CREATED = 1;
  RULE_CHANGED = 2;
  RULE_REMOVED = 3;
  ENFORCEMENT_TOGGLED = 4;
}

message FirewallActivityEvent {
  // Chain sequence number — uniquely identifies the row in the event log
  // and lets the UI dedupe live-appended events against the initial fetch.
  int64 seq = 1;
  FirewallActivityKind kind = 2;
  int64 timestamp_unix_ns = 3;
  // For rule-* kinds: the affected rule. For enforcement-toggled: empty.
  // The wire format keeps this on the message rather than splitting into
  // a oneof so the UI can read fields with a single null check.
  string process_path = 4;
  Direction direction = 5;
  FirewallAction action = 6;
  RuleSource source = 7;
  // Only meaningful for ENFORCEMENT_TOGGLED — true means the toggle flipped
  // enforcement on, false means off.
  bool enforcement_enabled = 8;
}

message GetFirewallActivityRequest {
  // Maximum number of rows to return. Server clamps to a sane upper bound
  // (currently 500). 0 means "use the server default" (currently 100).
  int32 limit = 1;
}

message GetFirewallActivityResponse {
  // Newest-first.
  repeated FirewallActivityEvent events = 1;
}

// ---- LAN scanner (Phase 9.3) ----

// Mirrors Beholder.Core.LanDevice. Vendor and hostname are empty-string when
// unknown (proto3 string default) rather than wrapped in a StringValue — keeps
// the wire format flat to match the Alert.summary precedent. Timestamps are
// Unix nanoseconds, mirroring every other timestamp on this surface.
message LanDevice {
  string mac = 1;                       // lowercase hex with colons, e.g. aa:bb:cc:dd:ee:ff
  string ip = 2;
  string vendor = 3;                    // "" when OUI prefix not in the IEEE registry
  string hostname = 4;                  // "" when mDNS-SD / mDNS-PTR / NetBIOS all failed
  int64 first_seen_unix_ns = 5;
  int64 last_seen_unix_ns = 6;
  // Phase 9.5: user-supplied cosmetic display name. "" when no label set.
  // Empty-string-as-null on the wire per the existing Alert.summary precedent.
  // Persisted in lan_device.label; NOT chain-audited (cosmetic UI state).
  string label = 7;
}

message ListLanDevicesRequest {
  // 0 = no time filter (return all). Non-zero filters via the
  // idx_lan_device_last_seen index per ARCHITECTURE.md.
  int64 seen_since_unix_ns = 1;
  // 0 = use the server default (200). Clamped to a max of 1000 on the server
  // to keep response size bounded — any LAN with > 1000 devices is well past
  // the v1 product target.
  int32 limit = 2;
}

message ListLanDevicesResponse {
  // Ordered last_seen_unix_ns DESC (most-recently-seen first).
  repeated LanDevice devices = 1;
}

// Empty request — the scanner has no per-call options today. Future per-IP
// targeted rescans would need a separate RPC rather than expanding this one.
message TriggerScanRequest {}

message TriggerScanResponse {
  // Recoverable failures (scanner disabled, no LAN attached, etc.) return
  // success=false with a human-readable message rather than throwing an
  // RpcException so the UI can render the reason inline. Input-validation
  // failures still throw InvalidArgument; cancellation propagates as
  // Cancelled. Mirrors the ApplyFirewallRule "soft-failure" precedent.
  bool success = 1;
  string message = 2;
  int32 devices_observed = 3;
}

// Stream event: a never-before-seen MAC was observed.
message LanDeviceFirstSeenEvent {
  LanDevice device = 1;
}

// Stream event: a known IP was observed with a different MAC than the one
// previously associated with it. previous_mac is the MAC that used to claim
// this IP; device carries the new MAC + the rest of the observation.
message LanDeviceMacChangedEvent {
  string previous_mac = 1;
  LanDevice device = 2;
}

// Stream event (Phase 9.5): the user changed a device's cosmetic label.
// device carries the full refreshed device including the new label value
// (empty string when the label was cleared).
message LanDeviceLabelChangedEvent {
  LanDevice device = 1;
}

// Phase 9.5: set or clear a device's user-supplied cosmetic label.
message SetLanDeviceLabelRequest {
  // MAC address of the device (lowercase hex with colons).
  string mac = 1;
  // Empty / whitespace-only label clears any existing label. Server clamps
  // to a maximum of 100 characters; longer labels return success=false.
  string label = 2;
}

message SetLanDeviceLabelResponse {
  // success=false for recoverable failures (no such MAC, label too long,
  // store throws). Hard validation errors (empty MAC) throw
  // InvalidArgument. Mirrors the TriggerScan / ApplyFirewallRule
  // soft-failure precedent.
  bool success = 1;
  string message = 2;
}

// ---- Settings (Phase 13.2) ----

// Mirrors Beholder.Core.RecordingSettingsSnapshot. One value message shared
// across the get + set surface for the Recording section.
message RecordingSettingsValues {
  bool filter_self_traffic = 1;
}

// Mirrors Beholder.Core.HostnameResolutionSettingsSnapshot. Shared across
// the get + set surface for the Hostname Resolution section.
message HostnameResolutionSettingsValues {
  bool enable_preload = 1;
  bool enable_reverse_dns_fallback = 2;
  bool enable_sni_capture = 3;
}

// Mirrors Beholder.Core.AlertSettingsSnapshot. Shared across the get + set
// surface for the Alerts section (Phase 13.3).
message AlertSettingsValues {
  bool enable_new_process_detection = 1;
  bool enable_hash_change_detection = 2;
  bool enable_chain_integrity_monitor = 3;
}

// Mirrors Beholder.Core.ScannerSettingsSnapshot. Shared across the get + set
// surface for the Scanner section (Phase 13.4).
message ScannerSettingsValues {
  bool enable_hostname_resolution = 1;
}

message GetSettingsRequest {}

// Bulk-read of every Settings section the UI renders. Future sub-phases
// (13.5 Storage) add their own value sub-messages here; existing fields
// stay stable.
message GetSettingsResponse {
  RecordingSettingsValues recording = 1;
  HostnameResolutionSettingsValues hostname_resolution = 2;
  AlertSettingsValues alerts = 3;
  ScannerSettingsValues scanner = 4;
}

message SetRecordingSettingsRequest {
  RecordingSettingsValues values = 1;
}

// success=false for recoverable failures (persistence threw, etc.). Hard
// validation errors throw InvalidArgument. Mirrors the SetLanDeviceLabel /
// TriggerScan soft-failure precedent. `values` echoes the resulting state
// after the operation — clients can use this to confirm the daemon's view
// matches what they intended.
message SetRecordingSettingsResponse {
  bool success = 1;
  string message = 2;
  RecordingSettingsValues values = 3;
}

message SetHostnameResolutionSettingsRequest {
  HostnameResolutionSettingsValues values = 1;
}

message SetHostnameResolutionSettingsResponse {
  bool success = 1;
  string message = 2;
  HostnameResolutionSettingsValues values = 3;
}

message SetAlertSettingsRequest {
  AlertSettingsValues values = 1;
}

message SetAlertSettingsResponse {
  bool success = 1;
  string message = 2;
  AlertSettingsValues values = 3;
}

message SetScannerSettingsRequest {
  ScannerSettingsValues values = 1;
}

message SetScannerSettingsResponse {
  bool success = 1;
  string message = 2;
  ScannerSettingsValues values = 3;
}

// ---- Storage stats (Phase 13.1) ----

// Mirrors Beholder.Core.TableStats. Per-table on-disk byte size is not
// surfaced — see the C# record's XML docs for why.
message TableStats {
  string name = 1;
  int64 row_count = 2;
}

// Mirrors Beholder.Core.ChainStatus. Wraps the existing VerifyChainResponse
// shape plus the wall-clock time at which the verification was captured.
// last_verified_unix_ns = 0 when no verification has run yet this session;
// the rest of the fields are then zero/empty as well.
message ChainStatus {
  int64 last_verified_unix_ns = 1;
  bool is_valid = 2;
  int64 rows_verified = 3;
  int64 failed_at_seq = 4;       // 0 when is_valid = true
  string error_message = 5;      // "" when is_valid = true
}

message GetStorageStatsRequest {}

// has_chain_status = false when the cache hasn't been written yet this
// session. Splitting the flag out keeps the wire shape unambiguous when
// chain_status's primitive fields default to zero/empty (which would
// otherwise be indistinguishable from a "real" never-failed result).
message GetStorageStatsResponse {
  string database_path = 1;
  int64 database_bytes_total = 2;
  repeated TableStats tables = 3;
  bool has_chain_status = 4;
  ChainStatus chain_status = 5;
  // Phase 13.1.1: backs the Settings tab About section's "Watching since"
  // row and the MOTD strip's status fields.
  // 0 when the chain is empty (fresh install). Otherwise the Unix-ns
  // timestamp of the earliest row in event_log.
  int64 chain_first_event_unix_ns = 6;
  // Wall-clock time at which the daemon process started. The Settings tab
  // derives "uptime 4h 12m" by subtracting from the current clock.
  int64 daemon_started_unix_ns = 7;
  // Duplicates the lan_device table's row count as a top-level field for
  // convenience. The Settings tab's MOTD strip uses this to render
  // "N LAN devices tracked" without re-scanning the per-table list.
  int64 lan_device_count = 8;
}

// ---- Service ----

service BeholderLocal {
  rpc Subscribe(SubscribeRequest) returns (stream DaemonEvent);
  rpc GetSnapshot(GetSnapshotRequest) returns (GetSnapshotResponse);
  rpc ApplyFirewallRule(ApplyFirewallRuleRequest) returns (ApplyFirewallRuleResponse);
  rpc RemoveFirewallRule(RemoveFirewallRuleRequest) returns (RemoveFirewallRuleResponse);
  rpc ListFirewallRules(ListFirewallRulesRequest) returns (ListFirewallRulesResponse);
  rpc SetFirewallEnabled(SetFirewallEnabledRequest) returns (SetFirewallEnabledResponse);
  rpc MarkAlertRead(MarkAlertReadRequest) returns (MarkAlertReadResponse);
  rpc VerifyChain(VerifyChainRequest) returns (VerifyChainResponse);
  rpc GetProcessTimeline(GetProcessTimelineRequest) returns (GetProcessTimelineResponse);
  rpc GetProcessDestinations(GetProcessDestinationsRequest) returns (GetProcessDestinationsResponse);
  rpc GetAggregateTimeline(GetAggregateTimelineRequest) returns (GetAggregateTimelineResponse);
  rpc GetCountryBreakdown(GetCountryBreakdownRequest) returns (GetCountryBreakdownResponse);
  rpc GetProtocolBreakdown(GetProtocolBreakdownRequest) returns (GetProtocolBreakdownResponse);
  rpc GetProcessSummaries(GetProcessSummariesRequest) returns (GetProcessSummariesResponse);
  rpc GetFirewallActivity(GetFirewallActivityRequest) returns (GetFirewallActivityResponse);
  // Phase 9.3 — LAN scanner IPC
  rpc ListLanDevices(ListLanDevicesRequest) returns (ListLanDevicesResponse);
  rpc TriggerScan(TriggerScanRequest) returns (TriggerScanResponse);
  // Phase 9.5 — user-supplied cosmetic label
  rpc SetLanDeviceLabel(SetLanDeviceLabelRequest) returns (SetLanDeviceLabelResponse);
  // Phase 13.1 — Settings tab Data Storage section
  rpc GetStorageStats(GetStorageStatsRequest) returns (GetStorageStatsResponse);
  // Phase 13.2 — Settings tab Recording + Hostname Resolution sections
  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse);
  rpc SetRecordingSettings(SetRecordingSettingsRequest) returns (SetRecordingSettingsResponse);
  rpc SetHostnameResolutionSettings(SetHostnameResolutionSettingsRequest) returns (SetHostnameResolutionSettingsResponse);
  // Phase 13.3 — Settings tab Alerts section
  rpc SetAlertSettings(SetAlertSettingsRequest) returns (SetAlertSettingsResponse);
  // Phase 13.4 — Settings tab Scanner section
  rpc SetScannerSettings(SetScannerSettingsRequest) returns (SetScannerSettingsResponse);
}
